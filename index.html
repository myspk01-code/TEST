/* CSS ẩn các nút này nếu người dùng cố tình dùng lệnh in hệ thống */

</style>

<script>
function xuatPDFThuVien() {
  // 1. Kiểm tra xem có đang mở trong trình duyệt nội bộ (Zalo/FB) không
  var isInApp = /FBAN|FBAV|Line|Zalo/i.test(navigator.userAgent);
  if (isInApp) {
    alert("Ứng dụng Zalo/Facebook đang chặn tính năng tải file. Bạn vui lòng bấm vào dấu 3 chấm (...) ở góc trên bên phải màn hình -> chọn 'Mở bằng trình duyệt' (Safari/Chrome) để tải file PDF nhé!");
    return;
  }

  // 2. Thay đổi trạng thái nút để người dùng biết hệ thống đang xử lý
  var nutBam = document.getElementById("btnXuatPDF");
  var nhanChu = document.getElementById("pdfTooltipText");
  nutBam.style.backgroundColor = "#7f8c8d"; 
  nhanChu.innerText = "Đang khởi tạo PDF...";

  // 3. Lấy vùng chứa nội dung báo cáo (Mặc định chụp toàn bộ thẻ body)
  // Nếu báo cáo nằm trong 1 thẻ div cố định, bạn có thể thay thế document.body bằng thẻ đó.
  var element = document.body; 

  // 4. Cấu hình chụp ảnh đóng gói PDF theo khổ giấy A4 NGANG (Landscape)
  var opt = {
    margin:       [5, 5, 5, 5], // Lề [trên, trái, dưới, phải] bằng mm
    filename:     'Bao-Cao-Nang-Luong-So.pdf',
    image:        { type: 'jpeg', quality: 0.98 },
    html2canvas:  { 
      scale: 2,           // Tăng độ nét của chữ và đường kẻ lên gấp đôi
      useCORS: true,      // Cho phép load ảnh từ link ngoài nếu có
      logging: false      // Tắt log debug
    },
    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'landscape' } // CHUYỂN KHỔ NGANG CHUẨN A4
  };

  // 5. Chạy lệnh tạo và tự động tải xuống
  html2pdf().set(opt).from(element).save().then(function() {
    // Trả nút bấm về trạng thái ban đầu sau khi tải xong
    nutBam.style.backgroundColor = "#e74c3c";
    nhanChu.innerText = "Tải file PDF";
  }).catch(function(error) {
    alert("Có lỗi xảy ra khi tạo PDF: " + error);
    nutBam.style.backgroundColor = "#e74c3c";
    nhanChu.innerText = "Tải file PDF";
  });
}
</script>
